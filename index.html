<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Fallas — Safari Indoor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f7f4ef;
    --cream: #ede9e2;
    --rust: #c0440a;
    --rust-light: #f5e8e0;
    --muted: #7a7570;
    --border: #d6d0c6;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  .site-header {
    background: var(--ink); color: var(--white);
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.2);
  }
  .site-header .logo-wrap { background: white; border-radius: 8px; padding: 5px 10px; display: flex; align-items: center; } .site-header .logo-wrap img { height: 38px; display: block; }
  .site-header .title-wrap { text-align: right; }
  .site-header .title-wrap h1 { font-family: 'DM Serif Display', serif; font-size: 1.15rem; }
  .site-header .title-wrap small { font-size: 0.72rem; color: #aaa; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn { padding: 9px 18px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; letter-spacing: 0.02em; }
  .btn-primary { background: var(--rust); color: #fff; }
  .btn-primary:hover { background: #a83a08; }
  .btn-outline { background: transparent; color: #fff; border: 1.5px solid #444; }
  .btn-outline:hover { border-color: #888; }
  .btn-sm { padding: 6px 12px; font-size: 0.76rem; }
  .btn-danger { background: #fee2e2; color: #b91c1c; }
  .btn-danger:hover { background: #fecaca; }

  .main { max-width: 860px; margin: 0 auto; padding: 32px 20px 60px; }

  .form-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 32px; box-shadow: var(--shadow); }
  .form-card-header { background: var(--rust); color: white; padding: 16px 24px; font-family: 'DM Serif Display', serif; font-size: 1.05rem; display: flex; align-items: center; gap: 10px; }
  .form-body { padding: 24px; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field-full { grid-column: 1 / -1; }
  .field label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select, .field textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink); background: var(--paper); transition: border-color 0.15s; outline: none; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--rust); background: #fff; }
  .field textarea { resize: vertical; min-height: 80px; }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; padding-top: 16px; border-top: 1px solid var(--cream); margin-top: 20px; }

  .section-title { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--ink); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .section-title .count { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; background: var(--rust-light); color: var(--rust); padding: 3px 10px; border-radius: 20px; font-weight: 600; }

  .empty-state { background: var(--white); border: 1px dashed var(--border); border-radius: 12px; padding: 40px; text-align: center; color: var(--muted); }
  .empty-state .big-ico { font-size: 40px; margin-bottom: 10px; }

  .records-list { display: flex; flex-direction: column; gap: 12px; }
  .record-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.15s; }
  .record-card:hover { transform: translateY(-1px); }
  .record-top { padding: 14px 18px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .record-info { flex: 1; }
  .record-proveedor { font-weight: 600; font-size: 0.9rem; color: var(--rust); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
  .record-producto { font-family: 'DM Serif Display', serif; font-size: 1rem; margin-bottom: 4px; }
  .record-meta { font-size: 0.78rem; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }
  .record-falla { font-size: 0.82rem; color: #555; padding: 8px 18px 12px; border-top: 1px solid var(--cream); background: var(--paper); display: flex; gap: 6px; }
  .record-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; transform: translateY(100%); transition: transform 0.25s ease; z-index: 200; box-shadow: 0 -4px 20px rgba(0,0,0,0.2); }
  .export-bar.visible { transform: translateY(0); }
  .export-bar p { font-size: 0.85rem; }
  .export-bar span { color: #aaa; font-size: 0.78rem; }
  .export-actions { display: flex; gap: 10px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 12px; max-width: 680px; width: 95%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .modal-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.1rem; }
  .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); line-height: 1; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  /* PRINT DOC */
  .print-doc { font-family: 'DM Sans', sans-serif; color: #111; }
  .pd-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 3px solid #1a1a1a; padding-bottom: 14px; margin-bottom: 18px; }
  .pd-logo img { height: 50px; }
  .pd-folio { text-align: right; }
  .pd-folio .folio-num { font-size: 1.1rem; font-weight: 700; font-family: 'DM Serif Display', serif; }
  .pd-folio small { font-size: 0.7rem; color: #777; display: block; }
  .pd-tag { display: inline-block; background: #fee2e2; color: #b91c1c; padding: 3px 10px; border-radius: 4px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .pd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 16px; }
  .pd-field label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; color: #888; display: block; margin-bottom: 2px; }
  .pd-field span { font-size: 0.88rem; font-weight: 500; }
  .pd-desc { margin-bottom: 16px; }
  .pd-desc label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; color: #888; display: block; margin-bottom: 4px; }
  .pd-desc p { font-size: 0.88rem; background: #f9f9f9; border: 1px solid #e5e5e5; border-radius: 6px; padding: 10px 12px; line-height: 1.5; }
  .pd-footer { border-top: 1px solid #ddd; padding-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
  .pd-sign { text-align: center; }
  .pd-sign .line { border-top: 1.5px solid #333; margin: 30px 10px 6px; }
  .pd-sign small { font-size: 0.72rem; color: #777; }
</style>
</head>

  <div class="title-wrap">
    <h1>Control de Fallas &amp; Garantías</h1>
    <small>Sistema de reportes a proveedores</small>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="exportCSV()">⬇ Exportar Excel</button>
    <button class="btn btn-primary" onclick="scrollToForm()">+ Nueva Falla</button>
  </div>
</header>

<main class="main">
  <div class="form-card" id="formSection">
    <div class="form-card-header">📋 &nbsp;Registrar Producto con Falla</div>
    <div class="form-body">
      <div class="field-grid">
        <div class="field">
          <label>Proveedor</label>
          <input type="text" id="f_proveedor" placeholder="Ej. Distribuidora XYZ" />
        </div>
        <div class="field">
          <label>Producto / Modelo</label>
          <input type="text" id="f_producto" placeholder="Ej. Lámpara LED modelo LT-200" />
        </div>
        <div class="field">
          <label>N° Folio / Ticket</label>
          <input type="text" id="f_folio" placeholder="Ej. F-2024-001" />
        </div>
        <div class="field">
          <label>Cantidad de Piezas</label>
          <input type="number" id="f_cantidad" placeholder="1" min="1" />
        </div>
        <div class="field">
          <label>Fecha de Venta / Compra</label>
          <input type="date" id="f_fecha_venta" />
        </div>
        <div class="field">
          <label>Fecha de Reporte</label>
          <input type="date" id="f_fecha_reporte" />
        </div>
        <div class="field field-full">
          <label>Descripción de la Falla</label>
          <textarea id="f_falla" placeholder="Ej. Falla en el circuito de encendido, la lámpara no enciende desde el día de instalación. Se reporta para cambio o reparación bajo garantía."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" style="color:var(--ink);border-color:var(--border)" onclick="clearForm()">Limpiar</button>
        <button class="btn btn-primary" onclick="addRecord()">Guardar Registro</button>
      </div>
    </div>
  </div>

  <div class="section-title">
    <span>Registros guardados</span>
    <span class="count" id="countBadge">0 registros</span>
  </div>
  <div id="recordsContainer">
    <div class="empty-state">
      <div class="big-ico">📦</div>
      <p>No hay registros aún.<br>Agrega el primer producto con falla.</p>
    </div>
  </div>
</main>

<div class="export-bar" id="exportBar">
  <div>
    <p>Registros listos para exportar</p>
    <span id="exportCount"></span>
  </div>
  <div class="export-actions">
    <button class="btn btn-outline" onclick="exportCSV()">⬇ Descargar Excel</button>
  </div>
</div>

<div class="modal-overlay" id="printModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Vista de Impresión</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="printContent"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" style="color:var(--ink);border-color:var(--border)" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="doPrint()">🖨 Imprimir hoja</button>
    </div>
  </div>
</div>

let records = JSON.parse(localStorage.getItem('safariFailures') || '[]');

function addRecord() {
  const proveedor = document.getElementById('f_proveedor').value.trim();
  const producto  = document.getElementById('f_producto').value.trim();
  const folio     = document.getElementById('f_folio').value.trim();
  const cantidad  = document.getElementById('f_cantidad').value.trim();
  const fventa    = document.getElementById('f_fecha_venta').value;
  const freporte  = document.getElementById('f_fecha_reporte').value;
  const falla     = document.getElementById('f_falla').value.trim();
  if (!proveedor || !producto || !falla) { alert('Por favor completa: Proveedor, Producto y Descripción de la falla.'); return; }
  records.push({ id: Date.now(), proveedor, producto, folio, cantidad, fecha_venta: fventa, fecha_reporte: freporte, falla, created: new Date().toISOString() });
  saveAndRender();
  clearForm();
}

function deleteRecord(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  records = records.filter(r => r.id !== id);
  saveAndRender();
}

function saveAndRender() {
  localStorage.setItem('safariFailures', JSON.stringify(records));
  renderRecords();
  updateExportBar();
}

function updateExportBar() {
  const bar = document.getElementById('exportBar');
  const cnt = document.getElementById('exportCount');
  if (records.length > 0) {
    bar.classList.add('visible');
    cnt.textContent = records.length + ' registro(s) en la base de datos local';
  } else { bar.classList.remove('visible'); }
  document.getElementById('countBadge').textContent = records.length + ' registro' + (records.length !== 1 ? 's' : '');
}

function renderRecords() {
  const container = document.getElementById('recordsContainer');
  if (records.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="big-ico">📦</div><p>No hay registros aún.<br>Agrega el primer producto con falla.</p></div>`;
    return;
  }
  container.innerHTML = `<div class="records-list">${records.map(r => `
    <div class="record-card">
      <div class="record-top">
        <div class="record-info">
          <div class="record-proveedor">${r.proveedor}</div>
          <div class="record-producto">${r.producto}</div>
          <div class="record-meta">
            ${r.folio ? `<span>📄 ${r.folio}</span>` : ''}
            ${r.cantidad ? `<span>📦 ${r.cantidad} pza(s)</span>` : ''}
            ${r.fecha_venta ? `<span>🛒 ${formatDate(r.fecha_venta)}</span>` : ''}
            ${r.fecha_reporte ? `<span>🔔 Reporte: ${formatDate(r.fecha_reporte)}</span>` : ''}
          </div>
        </div>
        <div class="record-actions">
          <button class="btn btn-sm btn-primary" onclick="openPrint(${r.id})">🖨</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRecord(${r.id})">✕</button>
        </div>
      </div>
      <div class="record-falla"><span>⚠️</span><span>${r.falla}</span></div>
    </div>`).join('')}
  </div>`;
}

function formatDate(str) {
  if (!str) return '—';
  const [y, m, d] = str.split('-');
  return `${d}/${m}/${y}`;
}

function openPrint(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  document.getElementById('printContent').innerHTML = buildPrintDoc(r);
  document.getElementById('printModal').classList.add('open');
}

function closeModal() { document.getElementById('printModal').classList.remove('open'); }

function buildPrintDoc(r) {
  return `
  <div class="print-doc" id="docToPrint">
    <div class="pd-header">
      <div class="pd-logo"><img src="${LOGO_DATA}" alt="Safari Indoor" /></div>
      <div class="pd-folio">
        <small>Folio</small>
        <div class="folio-num">${r.folio || '—'}</div>
        <small>Reporte: ${formatDate(r.fecha_reporte)}</small>
      </div>
    </div>
    <div class="pd-tag">⚠ Producto con falla — Solicitud de garantía</div>
    <div class="pd-grid">
      <div class="pd-field"><label>Proveedor</label><span>${r.proveedor}</span></div>
      <div class="pd-field"><label>Producto / Modelo</label><span>${r.producto}</span></div>
      <div class="pd-field"><label>Fecha de venta / compra</label><span>${formatDate(r.fecha_venta)}</span></div>
      <div class="pd-field"><label>Cantidad de piezas</label><span>${r.cantidad || '—'}</span></div>
    </div>
    <div class="pd-desc">
      <label>Descripción de la falla</label>
      <p>${r.falla}</p>
    </div>
    <div class="pd-footer">
      <div class="pd-sign"><div class="line"></div><small>Entregado por (Safari Indoor)</small></div>
      <div class="pd-sign"><div class="line"></div><small>Recibido por (${r.proveedor})</small></div>
    </div>
  </div>`;
}

function doPrint() {
  const content = document.getElementById('docToPrint').innerHTML;
  const win = window.open('', '_blank', 'width=700,height=900');
  win.document.write(`<!DOCTYPE html><html><head>
  <meta charset="UTF-8"><title>Reporte de Falla</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    .pd-logo img{height:50px;}
    .pd-folio{text-align:right;}
    .pd-folio .folio-num{font-size:1.1rem;font-weight:700;font-family:'DM Serif Display',serif;}
    .pd-folio small{font-size:0.7rem;color:#777;display:block;}
    .pd-tag{display:inline-block;background:#fee2e2;color:#b91c1c;padding:3px 10px;border-radius:4px;font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;}
    .pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:16px;}

    .pd-field span{font-size:0.88rem;font-weight:500;}
    .pd-desc{margin-bottom:16px;}
    .pd-desc label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.07em;color:#888;display:block;margin-bottom:4px;}
    .pd-desc p{font-size:0.88rem;background:#f9f9f9;border:1px solid #e5e5e5;border-radius:6px;padding:10px 12px;line-height:1.5;}
    .pd-footer{border-top:1px solid #ddd;padding-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:10px;}
    .pd-sign{text-align:center;}
    .pd-sign .line{border-top:1.5px solid #333;margin:30px 10px 6px;}
    .pd-sign small{font-size:0.72rem;color:#777;}
  </style></head><body>${content}
  <script>window.onload=()=>{window.print();}<\/script>
  </body></html>`);
  win.document.close();
}

function exportCSV() {
  if (records.length === 0) { alert('No hay registros para exportar.'); return; }

  const headers = ['ID','Proveedor','Producto / Modelo','Folio','Cantidad','Fecha Venta','Fecha Reporte','Descripción de la Falla','Registrado'];
  const rows = records.map(r => [
    r.id, r.proveedor, r.producto, r.folio || '', r.cantidad ? Number(r.cantidad) : '',
    r.fecha_venta || '', r.fecha_reporte || '',
    r.falla || '',
    new Date(r.created).toLocaleString('es-MX')
  ]);

  const wsData = [headers, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws['!cols'] = [
    {wch:14},{wch:28},{wch:30},{wch:16},{wch:12},
    {wch:16},{wch:16},{wch:50},{wch:22}
  ];

  // Header style (row 1)
  const headerStyle = {
    font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11, name: 'Arial' },
    fill: { patternType: 'solid', fgColor: { rgb: 'C0440A' } },
    alignment: { horizontal: 'center', vertical: 'center', wrapText: false },
    border: {
      bottom: { style: 'medium', color: { rgb: 'FFFFFF' } }
    }
  };

  const dataStyle = {
    font: { sz: 10, name: 'Arial' },
    alignment: { vertical: 'center', wrapText: true },
    border: {
      top:    { style: 'thin', color: { rgb: 'D6D0C6' } },
      bottom: { style: 'thin', color: { rgb: 'D6D0C6' } },
      left:   { style: 'thin', color: { rgb: 'D6D0C6' } },
      right:  { style: 'thin', color: { rgb: 'D6D0C6' } }
    }
  };

  const altStyle = {
    ...dataStyle,
    fill: { patternType: 'solid', fgColor: { rgb: 'F7F4EF' } }
  };

  const colLetters = ['A','B','C','D','E','F','G','H','I'];

  // Apply header styles
  colLetters.forEach(col => {
    const cell = ws[col + '1'];
    if (cell) cell.s = headerStyle;
  });

  // Apply data row styles
  for (let i = 0; i < rows.length; i++) {
    const rowNum = i + 2;
    const style = i % 2 === 0 ? dataStyle : altStyle;
    colLetters.forEach(col => {
      const addr = col + rowNum;
      if (!ws[addr]) ws[addr] = { v: '', t: 's' };
      ws[addr].s = style;
    });
  }

  // Row heights
  ws['!rows'] = [{ hpt: 28 }];
  for (let i = 0; i < rows.length; i++) ws['!rows'].push({ hpt: 22 });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Fallas');

  // Workbook props
  wb.Props = { Title: 'Reporte de Fallas Safari Indoor', Author: 'Safari Indoor' };

  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Safari_Fallas_${fecha}.xlsx`);
}

function clearForm() {
  ['f_proveedor','f_producto','f_folio','f_cantidad','f_fecha_venta','f_fecha_reporte','f_falla'].forEach(id => {
    document.getElementById(id).value = '';
  });
}
